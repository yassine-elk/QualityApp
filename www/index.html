<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
        initial-scale=1.0,
        maximum-scale=1.0,
        user-scalable=no"
    >

    <title>Quality</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
        }

        #splash {

            position: fixed;
            inset: 0;

            z-index: 9999;

            display: flex;
            flex-direction: column;

            align-items: center;
            justify-content: center;

            background:
                radial-gradient(
                    circle at center,
                    #ffffff 0%,
                    #f5f9fd 50%,
                    #e4eef8 100%
                );

            transition:
                opacity .6s ease,
                visibility .6s ease;
        }

        #splash.hide {
            opacity: 0;
            visibility: hidden;
        }

        .logo-container {

            animation:
                logoEnter 1s ease forwards;

        }

        .logo {

            width: 230px;
            max-width: 70vw;

            display: block;

        }

        .loader {

            position: relative;

            width: 170px;
            height: 3px;

            margin-top: 40px;

            overflow: hidden;

            border-radius: 50px;

            background:
                rgba(0, 84, 156, .12);

        }

        .loader-bar {

            position: absolute;

            width: 45%;
            height: 100%;

            border-radius: 50px;

            background: #00549c;

            animation:
                loading 1.3s
                ease-in-out
                infinite;

        }

        .loading-text {

            margin-top: 17px;

            color: #6f7f8f;

            font-size: 10px;

            font-weight: 600;

            letter-spacing: 3px;

            text-transform: uppercase;

        }

        .footer {

            position: absolute;

            left: 0;
            right: 0;

            bottom: 25px;

            color: #8191a1;

            font-size: 10px;

            letter-spacing: .5px;

            text-align: center;

        }

        @keyframes logoEnter {

            from {

                opacity: 0;

                transform:
                    translateY(15px)
                    scale(.92);

            }

            to {

                opacity: 1;

                transform:
                    translateY(0)
                    scale(1);

            }

        }

        @keyframes loading {

            0% {

                left: -50%;

            }

            50% {

                left: 55%;

            }

            100% {

                left: 110%;

            }

        }

    </style>

</head>


<body>


<div id="splash">


    <div class="logo-container">

        <img
            src="img/leoni-logo.svg"
            class="logo"
            alt="LEONI"
        >

    </div>


    <div class="loader">

        <div class="loader-bar"></div>

    </div>


    <div class="loading-text">

        Loading Quality

    </div>


    <div class="footer">

        LEONI - Quality WPA - elkhayat.dev © 2026

    </div>


</div>


<script src="cordova.js"></script>


<script>

    document.addEventListener(
        "deviceready",
        function () {

            setTimeout(function () {

                const splash =
                    document.getElementById(
                        "splash"
                    );

                splash.classList.add("hide");


                setTimeout(function () {

                    window.location.replace(
                        "https://quality.my-board.org/"
                    );

                }, 600);


            }, 2000);

        },
        false
    );

</script>


</body>

</html>
