<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no"
    >

    <title>LEONI Quality</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #f8fcff;
        }

        #splash {
            position: fixed;
            inset: 0;
            z-index: 9999;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            background: #f8fcff;

            opacity: 0;
            animation: splashFadeIn .8s ease forwards;
        }

        /* TOP BLUE DECORATION */

        .top-wave {
            position: absolute;
            top: -85px;
            left: -10%;
            width: 120%;
            height: 220px;

            background:
                linear-gradient(
                    135deg,
                    #173e8e,
                    #2776be,
                    #38bce9
                );

            border-radius:
                0 0 45% 55% /
                0 0 55% 45%;

            transform: rotate(-3deg);
        }

        .top-wave::after {
            content: "";
            position: absolute;

            width: 180px;
            height: 110px;

            right: 40px;
            bottom: -30px;

            background: #f8fcff;

            border-radius: 50%;
        }

        /* BOTTOM BLUE DECORATION */

        .bottom-wave {
            position: absolute;
            bottom: -100px;
            left: -10%;

            width: 120%;
            height: 220px;

            background:
                linear-gradient(
                    135deg,
                    #35bce9,
                    #2472bb,
                    #173d8e
                );

            border-radius:
                50% 50% 0 0 /
                45% 55% 0 0;

            transform: rotate(3deg);
        }

        .bottom-wave::after {
            content: "";
            position: absolute;

            width: 190px;
            height: 100px;

            left: 55px;
            top: -25px;

            background: #f8fcff;

            border-radius: 50%;
        }

        /* CONTENT */

        .content {
            position: relative;
            z-index: 10;

            display: flex;
            flex-direction: column;
            align-items: center;

            transform: translateY(-20px);
        }

        .welcome {
            font-family: cursive;
            font-size: 43px;
            font-weight: 300;

            color: #172331;

            margin-bottom: 5px;

            animation: welcomeEnter 1.2s ease;
        }

        .leoni {
            color: #28569d;

            font-size: 62px;
            font-weight: 800;

            letter-spacing: 1px;
        }

        .loading-title {
            margin-top: 90px;
            margin-bottom: 8px;

            color: #173c73;

            font-size: 20px;
            font-weight: 800;

            letter-spacing: 2px;
        }

        /* LOADING BAR */

        .loader {
            width: 190px;
            height: 45px;

            padding: 5px;

            border: 4px solid #173c73;
            border-radius: 30px;

            overflow: hidden;

            background: white;
        }

        .loader-inner {
            width: 100%;
            height: 100%;

            display: flex;
            gap: 4px;

            overflow: hidden;

            border-radius: 20px;
        }

        .bar {
            min-width: 15px;
            height: 45px;

            background: #164c91;

            transform: skewX(-22deg) translateY(-8px);

            animation: barLoading 1.4s ease-in-out infinite;
        }

        .bar:nth-child(2) {
            animation-delay: .1s;
        }

        .bar:nth-child(3) {
            animation-delay: .2s;
        }

        .bar:nth-child(4) {
            animation-delay: .3s;
        }

        .bar:nth-child(5) {
            animation-delay: .4s;
        }

        .bar:nth-child(6) {
            animation-delay: .5s;
        }

        .bar:nth-child(7) {
            animation-delay: .6s;
        }

        .bar:nth-child(8) {
            animation-delay: .7s;
        }

        /* FOOTER */

        .footer {
            position: absolute;

            left: 0;
            right: 0;
            bottom: 60px;

            z-index: 20;

            text-align: center;

            color: #DDDDDD;

            font-size: 19px;
        }

        /* ANIMATIONS */

        @keyframes splashFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes welcomeEnter {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes barLoading {
            0%,
            100% {
                background: #d8dee8;
            }

            50% {
                background: #164c91;
            }
        }

        #splash.hide {
            animation: splashOut .5s ease forwards;
        }

        @keyframes splashOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>

<div id="splash">

    <div class="top-wave"></div>

    <div class="content">

        <div class="leoni">
            LEONI
        </div>
        <br>
        <div class="welcome">
            Quality - WPA 
        </div>

        

        <div class="loading-title">
            LOADING......
        </div>

        <div class="loader">

            <div class="loader-inner">

                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>

            </div>

        </div>

    </div>

    <div class="footer">
        Leoni - Quality WPA - elkhayat.dev © 2026
    </div>

    <div class="bottom-wave"></div>

</div>

<script src="cordova.js"></script>

<script>
document.addEventListener("deviceready", function () {

    setTimeout(function () {

        const splash = document.getElementById("splash");

        splash.classList.add("hide");

        setTimeout(function () {

            window.location.replace(
                "https://quality.my-board.org/"
            );

        }, 500);

    }, 2500);

}, false);
</script>

</body>
</html>
